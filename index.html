<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>猪包边框 | Gallery Quality</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐽</text></svg>">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        /* === 核心变量：强化毛玻璃与背景对比 === */
        :root {
            /* 浅色模式 */
            --bg-color: #EBF1F6; /* 稍微加深一点点底色，让白色玻璃更明显 */
            --text-main: #1D1D1F;
            --text-muted: #86868B;
            
            /* 🔑 玻璃质感关键调整：降低背景透明度，增强模糊和边框高光 */
            --glass-bg: rgba(255, 255, 255, 0.25); 
            --glass-border: rgba(255, 255, 255, 0.6);
            --glass-shadow: 0 8px 32px 0 rgba(0, 30, 80, 0.08), inset 0 0 0 1px rgba(255, 255, 255, 0.5);
            
            --accent-color: #0066CC;
            /* 让光晕稍微鲜艳一点，才有东西被折射 */
            --orb-1: #A6C1EE; 
            --orb-2: #FBC2EB;
            
            --shimmer-bg: rgba(255, 255, 255, 0.3);
            --shimmer-highlight: rgba(255, 255, 255, 0.8);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                /* 深色模式 */
                --bg-color: #090A0F;
                --text-main: #F5F5F7;
                --text-muted: #A1A1A6;
                --glass-bg: rgba(20, 20, 30, 0.3);
                --glass-border: rgba(255, 255, 255, 0.1);
                --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5), inset 0 0 0 1px rgba(255, 255, 255, 0.05);
                --accent-color: #2997FF;
                --orb-1: #0A2458;
                --orb-2: #1D1845;
                --shimmer-bg: rgba(30, 30, 40, 0.4);
                --shimmer-highlight: rgba(255, 255, 255, 0.1);
            }
        }

        /* === 全局重置 === */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow-x: hidden;
            transition: background-color 0.5s ease;
        }

        /* === 巨型弥散流光背景 === */
        .aurora-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1; overflow: hidden; pointer-events: none;
        }
        .orb {
            position: absolute; border-radius: 50%;
            filter: blur(90px); /* 加大模糊，让光更柔和 */
            opacity: 0.7;
            animation: float 20s infinite alternate ease-in-out;
        }
        /* 调整光晕位置，确保它们经过屏幕中央的毛玻璃下方 */
        .orb-1 {
            width: 70vw; height: 70vw; background: var(--orb-1);
            top: -20%; left: -10%;
        }
        .orb-2 {
            width: 60vw; height: 60vw; background: var(--orb-2);
            bottom: -20%; right: -10%; animation-delay: -5s;
        }
        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(15vw, 15vh) scale(1.1); }
        }

        /* === 主容器 === */
        .container { width: 90%; max-width: 720px; padding: 60px 0 40px; display: flex; flex-direction: column; align-items: center; z-index: 1; }
        h1 { font-size: 42px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 12px; text-align: center; }
        .subtitle { font-size: 16px; color: var(--text-muted); letter-spacing: 0.01em; margin-bottom: 50px; text-align: center; font-weight: 400; }

        /* === 毛玻璃上传区 === */
        .upload-area {
            width: 100%;
            background: var(--glass-bg);
            /* 🔑 这里是毛玻璃生效的核心 */
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px); 
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 60px 20px;
            text-align: center;
            cursor: pointer;
            box-shadow: var(--glass-shadow);
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.3s ease, background 0.3s ease;
            display: flex; flex-direction: column; align-items: center; position: relative; overflow: hidden;
        }
        .upload-area:hover, .upload-area.dragover {
            transform: scale(0.98);
            background: rgba(255, 255, 255, 0.35); /* 悬浮时变白一点点 */
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .upload-icon { width: 48px; height: 48px; color: var(--accent-color); margin-bottom: 16px; opacity: 0.9; }
        .upload-text { font-size: 16px; font-weight: 500; margin-bottom: 8px; }
        .upload-hint { font-size: 13px; color: var(--text-muted); }
        #fileInput { display: none; }

        /* === 极简并排演示区 === */
        .demo-area { 
            width: 100%; 
            margin-top: 60px; 
            display: flex; 
            gap: 30px; /* 稍微拉近一点间距，让对比更紧凑 */
            justify-content: center; 
            align-items: flex-end; /* 🔑 关键：让底部文字标签对齐，视觉更稳定高级 */
        }
        .demo-col { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        /* 🔑 核心修改：打破 1:1，设定左右的非对称比例 */
        .demo-col:first-child { 
            flex: 0 0 40%; /* 左侧原图收缩 */
        }
        .demo-col:last-child { 
            flex: 0 0 55%; /* 右侧效果图放大 */
        }
        .demo-img-wrapper {
            width: 100%; border-radius: 12px; overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            transform-style: preserve-3d; will-change: transform;
        }
        .demo-img { width: 100%; height: auto; display: block; pointer-events: none; }
        .micro-label { margin-top: 16px; font-size: 11px; letter-spacing: 0.1em; color: var(--text-muted); text-transform: uppercase; font-weight: 600; }

        /* === 骨架屏加载区 === */
        .shimmer-container { display: none; width: 100%; margin-top: 40px; }
        .shimmer-card {
            width: 100%; aspect-ratio: 4/5; background: var(--shimmer-bg); border-radius: 20px;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            position: relative; overflow: hidden; border: 1px solid var(--glass-border); box-shadow: var(--glass-shadow);
        }
        .shimmer-card::after {
            content: ""; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, var(--shimmer-highlight), transparent);
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer { 100% { left: 200%; } }

        /* === 结果展示区 === */
        .result-container { width: 100%; margin-top: 40px; display: flex; flex-direction: column; gap: 40px; }
        .result-card {
            background: var(--glass-bg); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border); border-radius: 24px; padding: 24px;
            box-shadow: var(--glass-shadow); display: flex; flex-direction: column; align-items: center;
            animation: fadeIn 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .result-img-wrapper { width: 100%; border-radius: 12px; overflow: hidden; margin-bottom: 24px; transform-style: preserve-3d; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .result-img { width: 100%; height: auto; display: block; }
        .result-footer { width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 0 8px; }
        .result-index { font-size: 13px; color: var(--text-muted); font-weight: 500; }
        .download-link { color: var(--accent-color); text-decoration: none; font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 6px; transition: opacity 0.2s; }
        .download-link:hover { opacity: 0.8; }

        .batch-download {
            margin-top: 20px; width: 100%; padding: 16px; background: var(--glass-bg);
            border: 1px solid var(--glass-border); border-radius: 16px; color: var(--text-main);
            font-size: 15px; font-weight: 500; cursor: pointer;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            box-shadow: var(--glass-shadow); transition: all 0.2s; display: none;
        }
        .batch-download:hover { transform: translateY(-2px); border-color: var(--accent-color); }
        .footer { margin-top: 60px; font-size: 12px; color: var(--text-muted); letter-spacing: 0.05em; }

        @media (max-width: 600px) { 
            .demo-area { flex-direction: column; align-items: center; gap: 30px; } 
            /* 手机端恢复等宽，避免排版崩坏 */
            .demo-col:first-child, .demo-col:last-child { flex: 0 0 auto; width: 100%; max-width: 320px; }
            h1 { font-size: 32px; } 
        }
    </style>
</head>
<body>

<div class="aurora-bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
</div>

<div class="container">
    <h1>猪包边框</h1>
    <div class="subtitle">重构画廊级质感 · 极简边框生成工具</div>

    <div class="upload-area" id="dropZone" onclick="document.getElementById('fileInput').click()">
        <svg class="upload-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 16.5V9.75m0 0l3 3m-3-3l-3 3M6.75 19.5a2.25 2.25 0 01-2.25-2.25V6.75A2.25 2.25 0 016.75 4.5h10.5A2.25 2.25 0 0119.5 6.75v10.5a2.25 2.25 0 01-2.25 2.25m-10.5 0h10.5" />
        </svg>
        <div class="upload-text">点击或拖拽图片至此</div>
        <div class="upload-hint">支持批量上传本地文件</div>
        <input type="file" id="fileInput" accept="image/jpeg, image/png, image/webp" multiple>
    </div>

    <div class="demo-area" id="demoArea">
        <div class="demo-col">
            <div class="demo-img-wrapper tilt-card">
                <img src="demo_original.jpg" alt="Original" class="demo-img">
            </div>
            <div class="micro-label">Original</div>
        </div>
        <div class="demo-col">
            <div class="demo-img-wrapper tilt-card">
                 <img src="demo_processed.png" alt="Processed" class="demo-img">
            </div>
            <div class="micro-label">Processed</div>
        </div>
    </div>

    <div class="shimmer-container" id="loader">
        <div class="shimmer-card"></div>
    </div>

    <div class="result-container" id="resultContainer"></div>

    <button id="zipBtn" class="batch-download">打包下载全部 (.zip)</button>

    <div class="footer">Designed for Photography</div>
</div>

<script>
    function initTiltEffect() {
        const cards = document.querySelectorAll('.tilt-card');
        cards.forEach(card => {
            card.addEventListener('mousemove', e => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                const rotateX = ((y - centerY) / centerY) * -8; 
                const rotateY = ((x - centerX) / centerX) * 8;
                card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.02, 1.02, 1.02)`;
            });
            card.addEventListener('mouseleave', () => {
                card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)`;
            });
        });
    }
    initTiltEffect();

    const PARAMS = { border_scale: 0.09, blur_radius: 50, corner_radius: 90, shadow_blur: 50, shadow_opacity: 0.4 };
    
    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('dropZone');
    const resultContainer = document.getElementById('resultContainer');
    const loader = document.getElementById('loader');
    const demoArea = document.getElementById('demoArea');
    const zipBtn = document.getElementById('zipBtn');
    let processedFiles = [];

    fileInput.addEventListener('change', handleFiles);
    
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault(); dropZone.classList.remove('dragover');
        if (e.dataTransfer.files.length) processFiles(e.dataTransfer.files);
    });

    function handleFiles(e) { if (e.target.files.length) processFiles(e.target.files); }

    async function processFiles(files) {
        if (demoArea) demoArea.style.display = 'none';
        resultContainer.innerHTML = '';
        processedFiles = [];
        zipBtn.style.display = 'none';
        loader.style.display = 'block';

        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            if (!file.type.match('image.*')) continue;

            try {
                const resultDataUrl = await processSingleImage(file);
                const outputName = `gallery_${file.name.split('.')[0]}.png`;
                processedFiles.push({ name: outputName, data: resultDataUrl });
                createResultCard(resultDataUrl, outputName, i + 1, files.length);
            } catch (err) {
                console.error("处理出错:", err);
            }
        }
        loader.style.display = 'none';
        if (processedFiles.length > 1) zipBtn.style.display = 'block';
    }

    function processSingleImage(file) {
        return new Promise((resolve, reject) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const origW = img.width, origH = img.height;
                const baseSize = Math.min(origW, origH);
                let borderWidth = Math.max(Math.floor(baseSize * PARAMS.border_scale), 1);
                const newW = origW + (2 * borderWidth), newH = origH + (2 * borderWidth);

                canvas.width = newW; canvas.height = newH;

                ctx.save(); ctx.filter = `blur(${PARAMS.blur_radius}px)`; ctx.drawImage(img, -50, -50, newW + 100, newH + 100); ctx.restore();
                ctx.save(); ctx.globalAlpha = PARAMS.shadow_opacity; ctx.filter = `blur(${PARAMS.shadow_blur}px)`; ctx.fillStyle = "#000000"; roundRect(ctx, borderWidth, borderWidth, origW, origH, PARAMS.corner_radius); ctx.fill(); ctx.restore();
                ctx.save(); ctx.beginPath(); roundRect(ctx, borderWidth, borderWidth, origW, origH, PARAMS.corner_radius); ctx.clip(); ctx.drawImage(img, borderWidth, borderWidth, origW, origH); ctx.restore();

                resolve(canvas.toDataURL('image/png'));
            };
            img.onerror = reject;
            img.src = URL.createObjectURL(file);
        });
    }

    function roundRect(ctx, x, y, w, h, r) {
        if (w < 2 * r) r = w / 2; if (h < 2 * r) r = h / 2;
        ctx.beginPath(); ctx.moveTo(x + r, y); ctx.arcTo(x + w, y, x + w, y + h, r); ctx.arcTo(x + w, y + h, x, y + h, r); ctx.arcTo(x, y + h, x, y, r); ctx.arcTo(x, y, x + w, y, r); ctx.closePath();
    }

    function createResultCard(dataUrl, name, index, total) {
        const card = document.createElement('div');
        card.className = 'result-card';
        card.innerHTML = `
            <div class="result-img-wrapper tilt-card">
                <img src="${dataUrl}" class="result-img" alt="Result">
            </div>
            <div class="result-footer">
                <span class="result-index">${String(index).padStart(2, '0')} / ${String(total).padStart(2, '0')}</span>
                <a href="${dataUrl}" download="${name}" class="download-link">
                    <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3" />
                    </svg>
                    Save Image
                </a>
            </div>
        `;
        resultContainer.appendChild(card);
        initTiltEffect();
    }

    zipBtn.addEventListener('click', () => {
        if (!window.JSZip) return alert("JSZip loading failed. Please refresh.");
        const zip = new JSZip();
        processedFiles.forEach(file => { zip.file(file.name, file.data.split(',')[1], {base64: true}); });
        zip.generateAsync({type:"blob"}).then(content => { saveAs(content, "Gallery_Frames.zip"); });
    });
</script>
</body>
</html>
