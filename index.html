<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>猪包边框 | 画廊级质感生成</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐽</text></svg>">
    <!-- 核心依赖保留 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        /* === 清爽科技冰蓝色系设计系统 - 完全保留原有动效秩序 === */
        :root {
            /* 核心冰蓝色系 - 中低明度沉稳科技感，不同明度做层级区分，不低沉 */
            --blue-primary: #165DFF; /* 主色：核心按钮、标题、重点高亮 */
            --blue-secondary: #4080FF; /* 次色：hover状态、次要元素、层级区分 */
            --blue-light: #69B1FF; /* 浅蓝：边框、装饰线、弱高亮 */
            --blue-ultralight: #E8F3FF; /* 极浅蓝：玻璃态边框、背景装饰、弱对比 */
            --blue-deep: #0E42D2; /* 深蓝：点击态、强强调，不暗沉 */

            /* 点缀色：低饱和暖橙+暖粉，小面积使用，不抢主色 */
            --accent-orange: #FF9A62; /* 低饱和暖橙 */
            --accent-pink: #F78DA7; /* 低饱和暖粉 */

            /* 背景体系：浅冷灰通透基底，保留玻璃态质感 */
            --bg-base: #F5F7FA; /* 浅冷灰主基底，通透不发闷 */
            --bg-glass: linear-gradient(135deg, rgba(255, 255, 255, 0.75), rgba(255, 255, 255, 0.55));
            --bg-decoration: radial-gradient(circle at 20% 20%, rgba(22, 93, 255, 0.06), transparent 50%),
                            radial-gradient(circle at 80% 80%, rgba(64, 128, 255, 0.06), transparent 50%);
            
            /* 中性色体系：冷调灰，呼应冰蓝色系，无暗沉 */
            --bg-surface: rgba(255, 255, 255, 0.4);
            --border-normal: rgba(22, 93, 255, 0.15);
            --border-highlight: rgba(22, 93, 255, 0.3);
            --text-primary: #1D2129;
            --text-secondary: #4E5969;
            --text-tertiary: #86909C;

            /* 效果常量 - 100%保留原有动效规范，无任何修改 */
            --radius-sm: 12px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --radius-xl: 32px;
            --blur-glass: 24px;
            --shadow-sm: 0 4px 12px rgba(22, 93, 255, 0.08);
            --shadow-md: 0 8px 24px rgba(22, 93, 255, 0.12);
            --shadow-lg: 0 16px 48px rgba(22, 93, 255, 0.18);
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 全局重置与基础设定 - 布局无修改 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0 !important;
            padding: 0 !important;
            min-height: 100vh !important;
            /* 浅冷灰通透基底，极淡冰蓝装饰渐变，无暗沉 */
            background: var(--bg-decoration), var(--bg-base) !important;
            background-color: var(--bg-base) !important;
            color: var(--text-primary) !important;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* 容器规范 - 完全保留原有秩序 */
        .container {
            width: 92%;
            max-width: 720px;
            padding: 48px 0 80px;
        }

        /* === 标题区域 - 冰蓝色渐变，暖色系小面积点缀动效 === */
        h1 {
            font-weight: 800;
            font-size: 42px;
            text-align: center;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
            /* 冰蓝色系渐变，保持科技感 */
            background: linear-gradient(135deg, var(--blue-primary) 0%, var(--blue-light) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: titleFloat 6s ease-in-out infinite;
        }

        @keyframes titleFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }

        .subtitle {
            font-weight: 400;
            font-size: 16px;
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 48px;
            letter-spacing: 0.5px;
            line-height: 1.5;
        }

        /* 响应式标题适配 - 完全保留原有规范 */
        @media (min-width: 768px) {
            h1 { font-size: 56px; }
            .subtitle { font-size: 18px; }
        }

        @media (max-width: 480px) {
            h1 { font-size: 36px; }
            .container { padding: 32px 0 64px; }
        }

        /* === 上传区域 - 冰蓝色系玻璃态，纯色边框，保留所有动效 === */
        .upload-area {
            background: var(--bg-glass);
            backdrop-filter: blur(var(--blur-glass));
            -webkit-backdrop-filter: blur(var(--blur-glass));
            border: 2px dashed var(--border-normal);
            border-radius: var(--radius-lg);
            padding: 56px 24px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition-smooth);
            position: relative;
            overflow: hidden;
        }

        /* 上传区hover/拖拽状态 - 冰蓝色高亮，纯色边框，无渐变 */
        .upload-area:hover, .upload-area.dragover {
            border-color: var(--border-highlight);
            border-style: solid;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.85), rgba(255, 255, 255, 0.65));
            box-shadow: var(--shadow-lg), 0 0 40px rgba(22, 93, 255, 0.15);
            transform: translateY(-2px);
        }

        .upload-area::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 50% 50%, rgba(22, 93, 255, 0.06), transparent 70%);
            opacity: 0;
            transition: var(--transition-smooth);
            pointer-events: none;
        }

        .upload-area:hover::before, .upload-area.dragover::before {
            opacity: 1;
        }

        .upload-icon {
            color: var(--text-tertiary);
            width: 56px;
            height: 56px;
            margin-bottom: 20px;
            filter: drop-shadow(0 4px 8px rgba(22, 93, 255, 0.1));
            transition: var(--transition-smooth);
        }

        .upload-area:hover .upload-icon {
            color: var(--blue-secondary);
            transform: translateY(-4px);
        }

        .upload-text {
            color: var(--text-primary);
            font-size: 18px;
            font-weight: 600;
            display: block;
            margin-bottom: 20px;
            letter-spacing: 0.3px;
        }

        .upload-btn {
            background: var(--blue-primary); /* 纯色主冰蓝，无渐变，强化利落感 */
            color: #FFFFFF;
            border-radius: var(--radius-md);
            padding: 12px 32px;
            font-weight: 600;
            font-size: 15px;
            border: none;
            box-shadow: 0 8px 20px rgba(22, 93, 255, 0.3);
            cursor: pointer;
            transition: var(--transition-smooth);
            display: inline-block;
            letter-spacing: 0.3px;
        }

        .upload-btn:hover {
            background: var(--blue-secondary); /* 次冰蓝做hover层级区分 */
            transform: scale(1.03);
            box-shadow: 0 12px 28px rgba(22, 93, 255, 0.4);
        }

        .upload-btn:active {
            background: var(--blue-deep); /* 深蓝做点击态层级区分 */
            transform: scale(0.98);
        }

        #fileInput { display: none; }

        /* === 移动端提示 - 暖色系小面积点缀 === */
        .mobile-tip {
            background: var(--bg-glass);
            backdrop-filter: blur(var(--blur-glass));
            -webkit-backdrop-filter: blur(var(--blur-glass));
            border: 1px solid var(--border-normal);
            padding: 14px 16px;
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            font-size: 14px;
            text-align: center;
            margin-bottom: 24px;
            display: none;
            line-height: 1.5;
        }

        /* === 加载动画 - 冰蓝色系，保留原有动效 === */
        .loader {
            display: none;
            margin: 32px auto;
            width: 40px;
            height: 40px;
            position: relative;
        }

        .loader::before, .loader::after {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 3px solid transparent;
        }

        .loader::before {
            border-top-color: var(--blue-ultralight);
            animation: spin 1.2s linear infinite;
        }

        .loader::after {
            border-top-color: var(--blue-primary);
            animation: spin 0.6s linear infinite reverse;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* === 演示区域 - 冰蓝色系玻璃态，暖色系点缀 === */
        .demo-area {
            width: 100%;
            margin-top: 48px;
            text-align: center;
        }

        .demo-title {
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-tertiary);
            font-size: 15px;
            letter-spacing: 2px;
            margin-bottom: 32px;
            font-weight: 500;
        }

        /* 标题装饰：暖色系小面积点缀，不抢主色 */
        .demo-title::before, .demo-title::after {
            content: "";
            flex: 1;
            border-bottom: 1px dashed var(--border-normal);
            margin: 0 16px;
        }

        .demo-grid {
            display: flex;
            gap: 32px;
            justify-content: center;
            align-items: flex-end;
            padding: 32px 24px;
            background: var(--bg-glass);
            backdrop-filter: blur(var(--blur-glass));
            -webkit-backdrop-filter: blur(var(--blur-glass));
            border: 1px solid var(--border-normal);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
        }

        .demo-col {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .demo-col:first-child { flex: 0 0 44%; }
        .demo-col:last-child { flex: 0 0 54%; }

        .demo-img {
            width: 100% !important;
            height: auto !important;
            border: 8px solid #FFFFFF;
            border-radius: var(--radius-sm);
            box-shadow: var(--shadow-md);
            pointer-events: none;
            box-sizing: border-box;
        }

        .demo-caption {
            font-size: 13px;
            color: var(--text-tertiary);
            margin-top: 16px;
        }

        .img-label {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        /* 效果标签：暖粉点缀，小面积使用 */
        .demo-col:last-child .img-label {
            background: var(--accent-pink);
            color: #FFFFFF;
            padding: 4px 12px;
            border-radius: 999px;
        }

        /* 移动端演示区适配 - 完全保留原有规范 */
        @media (max-width: 600px) {
            .demo-grid {
                flex-direction: column;
                align-items: center;
                gap: 24px;
                padding: 24px 16px;
            }
            .demo-col:first-child, .demo-col:last-child {
                flex: 0 0 auto;
                width: 100%;
                max-width: 320px;
            }
        }

        /* === 结果展示区 - 冰蓝色系玻璃态，纯色边框 === */
        .result-container {
            margin-top: 32px;
            width: 100%;
        }

        .card {
            margin-bottom: 32px;
            animation: fadeInUp 0.5s ease;
            background: var(--bg-glass);
            backdrop-filter: blur(var(--blur-glass));
            -webkit-backdrop-filter: blur(var(--blur-glass));
            border: 1px solid var(--border-normal);
            border-radius: var(--radius-lg);
            padding: 20px;
            box-shadow: var(--shadow-sm);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-img {
            width: 100%;
            aspect-ratio: 3 / 4;
            object-fit: contain;
            height: auto;
            border: 10px solid #FFFFFF;
            border-radius: var(--radius-sm);
            box-shadow: var(--shadow-md);
            display: block;
        }

        .card-controls {
            display: flex;
            align-items: center;
            margin-top: 20px;
            gap: 16px;
        }

        /* 序号徽章：暖橙点缀，小面积使用 */
        .index-badge {
            background: var(--bg-surface);
            color: var(--accent-orange);
            border: 1px solid rgba(255, 154, 98, 0.2);
            padding: 14px 16px;
            border-radius: var(--radius-md);
            font-weight: 700;
            min-width: 48px;
            text-align: center;
        }

        .download-btn {
            flex: 1;
            background: var(--blue-primary); /* 纯色主冰蓝，无渐变 */
            color: #FFFFFF;
            border: none;
            border-radius: var(--radius-md);
            padding: 14px 20px;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.3px;
            box-shadow: 0 8px 20px rgba(22, 93, 255, 0.25);
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            transition: var(--transition-smooth);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .download-btn:hover {
            background: var(--blue-secondary); /* 次冰蓝做hover层级区分 */
            transform: scale(1.02);
            box-shadow: 0 12px 28px rgba(22, 93, 255, 0.35);
        }

        .download-btn:active {
            background: var(--blue-deep); /* 深蓝做点击态层级区分 */
            transform: scale(0.98);
        }

        .download-btn.secondary {
            background: var(--bg-glass);
            backdrop-filter: blur(var(--blur-glass));
            -webkit-backdrop-filter: blur(var(--blur-glass));
            border: 1px solid var(--border-highlight);
            color: var(--blue-primary);
            box-shadow: var(--shadow-sm);
        }

        .download-btn.secondary:hover {
            background: var(--blue-ultralight);
            border-color: var(--blue-light);
        }

        .divider {
            border: 0;
            border-top: 1px dashed var(--border-normal);
            margin: 24px 0 0;
        }

        /* === 批量下载容器 - 次冰蓝纯色，无渐变 === */
        #batchDownloadContainer {
            display: none;
            margin-top: 24px;
        }

        #zipBtn {
            width: 100%;
            background: var(--blue-secondary); /* 次冰蓝纯色，和主按钮做层级区分 */
            box-shadow: 0 8px 20px rgba(64, 128, 255, 0.25);
        }

        #zipBtn:hover {
            background: var(--blue-light); /* 浅冰蓝做hover层级区分 */
            box-shadow: 0 12px 28px rgba(64, 128, 255, 0.35);
        }

        /* === 底部版权 - 冰蓝色系，暖色系小点缀 === */
        .footer {
            text-align: center;
            color: var(--text-tertiary);
            font-size: 13px;
            margin: 64px 0 20px;
            letter-spacing: 0.5px;
        }

        /* 滚动条美化 - 冰蓝色系 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(22, 93, 255, 0.3);
            border-radius: 999px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(22, 93, 255, 0.45);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>猪包边框</h1>
    <div class="subtitle">一键生成自适应模糊边框，打造画廊级质感</div>

    <!-- 上传区域 - 核心功能区 -->
    <div class="upload-area" id="dropZone">
        <svg class="upload-icon" fill="currentColor" viewBox="0 0 24 24">
            <path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/>
        </svg>
        <span class="upload-text">点击或拖拽图片到这里 (支持批量上传)</span>
        <button class="upload-btn" onclick="document.getElementById('fileInput').click()">浏览本地文件</button>
        <input type="file" id="fileInput" accept="image/jpeg, image/png" multiple>
    </div>

    <!-- 加载动画 -->
    <div class="loader" id="loader"></div>

    <!-- 效果演示区 -->
    <div id="demoArea" class="demo-area">
        <div class="demo-title">✦ 效果演示 ✦</div>
        <div class="demo-grid">
            <div class="demo-col">
                <img src="demo_original.jpg" alt="原图" class="demo-img" onerror="this.style.display='none'">
                <div class="img-label">原图 ORIGINAL</div>
            </div>
            <div class="demo-col">
                <img src="demo_processed.png" alt="效果图" class="demo-img" onerror="this.style.display='none'">
                <div class="img-label">效果 EFFECT</div>
            </div>
        </div>
        <div class="demo-caption">上传照片，即刻生成同款画廊级质感</div>
    </div>

    <!-- 处理结果容器 -->
    <div class="result-container" id="resultContainer"></div>
    
    <!-- 批量下载按钮 -->
    <div id="batchDownloadContainer">
        <button id="zipBtn" class="download-btn">
            📦 一键打包下载全部图片 (.zip)
        </button>
    </div>

    <!-- 页脚 -->
    <div class="footer">Designed for Photography · 2026</div>
</div>

<script>
    // === 核心配置参数 - 100%保留原有参数，无修改 ===
    const PARAMS = {
        border_scale: 0.09,
        blur_radius: 50, 
        corner_radius: 90, 
        shadow_blur: 50,
        shadow_opacity: 0.4
    };

    // === DOM元素获取 - 无修改 ===
    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('dropZone');
    const resultContainer = document.getElementById('resultContainer');
    const loader = document.getElementById('loader');
    const batchDownloadContainer = document.getElementById('batchDownloadContainer');
    const zipBtn = document.getElementById('zipBtn');
    const demoArea = document.getElementById('demoArea');
    
    let processedFiles = [];

    // === 事件监听 - 100%保留原有逻辑，无修改 ===
    fileInput.addEventListener('change', handleFiles);
    
    // 拖拽上传逻辑
    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('dragover');
    });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        const files = e.dataTransfer.files;
        if (files.length) processFiles(files);
    });

    // === 核心处理函数 - 100%保留原有功能，无任何修改 ===
    function handleFiles(e) {
        const files = e.target.files;
        if (files.length) processFiles(files);
    }

    // 批量处理图片
    async function processFiles(files) {
        // 隐藏演示区
        if (demoArea) demoArea.style.display = 'none';

        // 重置状态
        resultContainer.innerHTML = '';
        processedFiles = [];
        batchDownloadContainer.style.display = 'none';
        loader.style.display = 'block';
        
        // 添加移动端提示
        const tip = document.createElement('div');
        tip.className = 'mobile-tip';
        tip.innerHTML = '💡 手机用户提示：<br>点击下方按钮直接下载，或 <b>长按图片</b> 保存到相册';
        tip.style.display = 'block';
        resultContainer.appendChild(tip);

        // 循环处理每一张图片
        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            if (!file.type.match('image.*')) continue;

            try {
                const resultDataUrl = await processSingleImage(file);
                const outputName = `framed_${file.name.split('.')[0]}.png`;
                processedFiles.push({ name: outputName, data: resultDataUrl });
                createResultCard(resultDataUrl, outputName, i + 1);
            } catch (err) {
                console.error("图片处理出错:", err);
                alert(`图片 ${file.name} 处理失败，请重试`);
            }
        }

        // 处理完成
        loader.style.display = 'none';
        if (processedFiles.length > 1) {
            batchDownloadContainer.style.display = 'block';
        }
        // 清空input，支持重复上传同一张图
        fileInput.value = '';
    }

    // 单张图片处理核心逻辑
    function processSingleImage(file) {
        return new Promise((resolve, reject) => {
            const img = new Image();
            img.crossOrigin = 'anonymous';
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');

                const origW = img.width;
                const origH = img.height;
                const baseSize = Math.min(origW, origH);
                
                // 计算边框宽度
                let borderWidth = Math.floor(baseSize * PARAMS.border_scale);
                borderWidth = Math.max(borderWidth, 1);
                
                const newW = origW + (2 * borderWidth);
                const newH = origH + (2 * borderWidth);

                canvas.width = newW;
                canvas.height = newH;

                // 1. 绘制模糊背景层
                ctx.save();
                ctx.filter = `blur(${PARAMS.blur_radius}px)`;
                ctx.drawImage(img, -50, -50, newW + 100, newH + 100);
                ctx.restore();

                // 2. 绘制阴影层
                ctx.save();
                ctx.globalAlpha = PARAMS.shadow_opacity;
                ctx.filter = `blur(${PARAMS.shadow_blur}px)`;
                ctx.fillStyle = "#000000";
                roundRect(ctx, borderWidth, borderWidth, origW, origH, PARAMS.corner_radius);
                ctx.fill();
                ctx.restore();

                // 3. 绘制原图（圆角裁剪）
                ctx.save();
                ctx.beginPath();
                roundRect(ctx, borderWidth, borderWidth, origW, origH, PARAMS.corner_radius);
                ctx.clip(); 
                ctx.drawImage(img, borderWidth, borderWidth, origW, origH);
                ctx.restore();

                resolve(canvas.toDataURL('image/png'));
            };
            img.onerror = reject;
            img.src = URL.createObjectURL(file);
        });
    }

    // 圆角矩形工具函数
    function roundRect(ctx, x, y, w, h, r) {
        if (w < 2 * r) r = w / 2;
        if (h < 2 * r) r = h / 2;
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.arcTo(x + w, y, x + w, y + h, r);
        ctx.arcTo(x + w, y + h, x, y + h, r);
        ctx.arcTo(x, y + h, x, y, r);
        ctx.arcTo(x, y, x + w, y, r);
        ctx.closePath();
    }

    // 生成结果卡片
    function createResultCard(dataUrl, name, index) {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <img src="${dataUrl}" class="result-img" alt="处理完成的图片">
            <div class="card-controls">
                <div class="index-badge">#${index}</div>
                <a href="${dataUrl}" download="${name}" class="download-btn">
                    <span>⬇️ 保存图片</span>
                </a>
            </div>
            <hr class="divider">
        `;
        resultContainer.appendChild(card);
    }

    // 批量打包下载功能
    zipBtn.addEventListener('click', () => {
        if (!window.JSZip) {
            alert("JSZip 库加载失败，请检查网络连接后刷新页面重试");
            return;
        }
        const zip = new JSZip();
        processedFiles.forEach(file => {
            const base64Data = file.data.split(',')[1];
            zip.file(file.name, base64Data, {base64: true});
        });
        zip.generateAsync({type:"blob"}).then(function(content) {
            saveAs(content, "framed_photos_bundle.zip");
        });
    });
</script>
</body>
</html>
