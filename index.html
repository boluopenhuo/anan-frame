<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anan Studio | Gallery Quality</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22 filter=%22grayscale(1)%22>🐽</text></svg>">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        /* === 核心变量：强化毛玻璃与背景对比 === */
        :root {
            /* 浅色模式 */
            --bg-color: #EBF1F6;
            --text-main: #1D1D1F;
            --text-muted: #86868B;
            --glass-bg: rgba(255, 255, 255, 0.25);
            --glass-border: rgba(255, 255, 255, 0.6);
            --glass-shadow: 0 8px 32px 0 rgba(0, 30, 80, 0.08), inset 0 0 0 1px rgba(255, 255, 255, 0.5);
            --accent-color: #0066CC;
            --accent-glow: rgba(0, 102, 204, 0.4);
            --orb-1: #A6C1EE;
            --orb-2: #FBC2EB;
            --shimmer-bg: rgba(255, 255, 255, 0.3);
            --shimmer-highlight: rgba(255, 255, 255, 0.8);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                /* 深色模式 */
                --bg-color: #090A0F;
                --text-main: #F5F5F7;
                --text-muted: #A1A1A6;
                --glass-bg: rgba(20, 20, 30, 0.3);
                --glass-border: rgba(255, 255, 255, 0.1);
                --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5), inset 0 0 0 1px rgba(255, 255, 255, 0.05);
                --accent-color: #2997FF;
                --accent-glow: rgba(41, 151, 255, 0.4);
                --orb-1: #0A2458;
                --orb-2: #1D1845;
                --shimmer-bg: rgba(30, 30, 40, 0.4);
                --shimmer-highlight: rgba(255, 255, 255, 0.1);
            }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
        body {
            background-color: var(--bg-color); color: var(--text-main);
            font-family: "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh; display: flex; flex-direction: column; align-items: center;
            position: relative; overflow-x: hidden; transition: background-color 0.5s ease;
        }

        /* 巨型弥散流光背景 */
        .aurora-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; overflow: hidden; pointer-events: none; }
        .orb { position: absolute; border-radius: 50%; filter: blur(90px); opacity: 0.7; animation: float 20s infinite alternate ease-in-out; }
        .orb-1 { width: 70vw; height: 70vw; background: var(--orb-1); top: -20%; left: -10%; }
        .orb-2 { width: 60vw; height: 60vw; background: var(--orb-2); bottom: -20%; right: -10%; animation-delay: -5s; }
        @keyframes float { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(15vw, 15vh) scale(1.1); } }

        .container { width: 90%; max-width: 800px; padding: 60px 0 40px; display: flex; flex-direction: column; align-items: center; z-index: 1; }

        /* === 极客硅谷风 Title === */
        .brand-title {
            font-size: 46px; font-weight: 800; letter-spacing: -0.04em;
            margin-bottom: 8px; display: flex; align-items: center; gap: 12px;
        }
        .brand-emoji {
            font-size: 38px;
            filter: grayscale(1) opacity(0.7); /* 默认单色、高冷 */
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            cursor: pointer;
        }
        .brand-emoji:hover {
            filter: grayscale(0) opacity(1); /* 鼠标放上去的彩蛋 */
            transform: scale(1.1) rotate(10deg);
        }
        .subtitle { font-size: 15px; color: var(--text-muted); letter-spacing: 0.05em; margin-bottom: 50px; text-align: center; font-weight: 500; text-transform: uppercase; }

        /* === A+B 结合的顶级上传组件 (柔和极光版) === */
        .upload-area {
            width: 100%; max-width: 720px;
            /* 🔑 恢复了纯净的毛玻璃底色，拒绝迪斯科光污染 */
            background: var(--glass-bg);
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border-radius: 24px; padding: 60px 20px; text-align: center; cursor: pointer;
            box-shadow: var(--glass-shadow);
            position: relative; 
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.3s;
            z-index: 1;
        }

        /* A: 柔和极光边框 (严格锁死在边框内) */
        .upload-area::before {
            content: ''; position: absolute; inset: 0;
            border-radius: 24px; 
            padding: 1.5px; /* 这里控制极光光束的粗细 */
            
            /* 🔑 极度克制的调色：透明 -> 冰川灰蓝 -> 极光淡紫 -> 透明 */
            background: linear-gradient(
                110deg,
                rgba(255, 255, 255, 0) 0%,
                rgba(166, 193, 238, 0.5) 25%,
                rgba(251, 194, 235, 0.6) 50%,
                rgba(166, 193, 238, 0.5) 75%,
                rgba(255, 255, 255, 0) 100%
            );
            background-size: 200% auto;
            animation: auroraFlow 4s linear infinite;
            
            /* 🔑 终极魔法：利用 mask 把中心完全掏空，只留下 1.5px 的边框！光线绝对不会漏进中间 */
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor; mask-composite: exclude;
            z-index: -1; pointer-events: none;
        }

        /* 采用背景位移动画，全浏览器兼容，绝对不会静止卡死 */
        @keyframes auroraFlow {
            0% { background-position: 200% center; }
            100% { background-position: 0% center; }
        }

        /* B: 磁吸聚光灯 (默认隐藏，悬浮显示) */
        .spotlight {
            position: absolute; inset: 0; pointer-events: none; z-index: 0;
            background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), var(--accent-glow) 0%, transparent 40%);
            opacity: 0; transition: opacity 0.3s;
            border-radius: 24px;
            overflow: hidden; /* 防止聚光灯溢出圆角 */
        }
        
        /* 交互逻辑：悬浮时极光变暗，聚光灯亮起，卡片微浮 */
        .upload-area:hover::before { opacity: 0.2; }
        .upload-area:hover .spotlight { opacity: 1; }
        .upload-area:hover { transform: translateY(-2px); box-shadow: 0 15px 35px rgba(0,0,0,0.1); }

        /* 点击水波纹 */
        .ripple {
            position: absolute; border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
            transform: scale(0); animation: rippleEffect 0.6s linear;
            pointer-events: none; z-index: 0;
        }
        @keyframes rippleEffect {
            to { transform: scale(4); opacity: 0; }
        }

        /* 提高层级，防止被遮罩挡住 */
        .upload-icon { width: 48px; height: 48px; color: var(--accent-color); margin-bottom: 16px; opacity: 0.9; position: relative; z-index: 2;}
        .upload-text { font-size: 16px; font-weight: 500; margin-bottom: 8px; position: relative; z-index: 2;}
        .upload-hint { font-size: 13px; color: var(--text-muted); position: relative; z-index: 2;}
        #fileInput { display: none; }

        /* === 统一的玻璃控制台 (演示区) === */
        .demo-console {
            width: 100%; margin-top: 60px;
            background: var(--glass-bg); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border); border-radius: 28px;
            padding: 40px; box-shadow: var(--glass-shadow);
            display: flex; flex-direction: column; align-items: center;
        }
        .console-header {
            width: 100%; display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 30px; padding-bottom: 15px; border-bottom: 1px solid rgba(134, 134, 139, 0.2);
        }
        .console-title { font-size: 12px; font-weight: 600; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; }
        .console-dots { display: flex; gap: 6px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--text-muted); opacity: 0.3; }

        .demo-area { width: 100%; display: flex; gap: 40px; justify-content: center; align-items: flex-end; }
        .demo-col { display: flex; flex-direction: column; align-items: center; }
        .demo-col:first-child { flex: 0 0 38%; } /* 左侧原图更小 */
        .demo-col:last-child { flex: 0 0 58%; } /* 右侧效果图更大 */
        
        .demo-img-wrapper {
            width: 100%; border-radius: 12px; overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            transform-style: preserve-3d; will-change: transform;
        }
        .demo-img { width: 100%; height: auto; display: block; pointer-events: none; }
        .micro-label { margin-top: 16px; font-size: 11px; letter-spacing: 0.15em; color: var(--text-muted); text-transform: uppercase; font-weight: 600; }

        /* === 其他核心样式保持不变 === */
        .shimmer-container { display: none; width: 100%; margin-top: 40px; }
        .shimmer-card { width: 100%; aspect-ratio: 4/5; background: var(--shimmer-bg); border-radius: 20px; backdrop-filter: blur(10px); position: relative; overflow: hidden; border: 1px solid var(--glass-border); box-shadow: var(--glass-shadow); }
        .shimmer-card::after { content: ""; position: absolute; top: 0; left: -100%; width: 50%; height: 100%; background: linear-gradient(90deg, transparent, var(--shimmer-highlight), transparent); animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 100% { left: 200%; } }

        .result-container { width: 100%; margin-top: 40px; display: flex; flex-direction: column; gap: 40px; }
        .result-card { background: var(--glass-bg); backdrop-filter: blur(24px); border: 1px solid var(--glass-border); border-radius: 24px; padding: 24px; box-shadow: var(--glass-shadow); display: flex; flex-direction: column; align-items: center; animation: fadeIn 0.6s cubic-bezier(0.25, 1, 0.5, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .result-img-wrapper { width: 100%; border-radius: 12px; overflow: hidden; margin-bottom: 24px; transform-style: preserve-3d; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .result-img { width: 100%; height: auto; display: block; }
        .result-footer { width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 0 8px; }
        .result-index { font-size: 13px; color: var(--text-muted); font-weight: 500; }
        .download-link { color: var(--accent-color); text-decoration: none; font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 6px; transition: opacity 0.2s; }
        .download-link:hover { opacity: 0.8; }

        .batch-download { margin-top: 20px; width: 100%; padding: 16px; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 16px; color: var(--text-main); font-size: 15px; font-weight: 600; cursor: pointer; backdrop-filter: blur(10px); box-shadow: var(--glass-shadow); transition: all 0.2s; display: none; }
        .batch-download:hover { transform: translateY(-2px); border-color: var(--accent-color); }
        .footer { margin-top: 60px; font-size: 12px; color: var(--text-muted); letter-spacing: 0.05em; }

        /* 手机端适配 */
        @media (max-width: 768px) {
            .demo-console { padding: 20px; }
            .demo-area { flex-direction: column; align-items: center; gap: 30px; }
            .demo-col:first-child, .demo-col:last-child { flex: 0 0 auto; width: 100%; max-width: 320px; }
            .brand-title { font-size: 36px; }
        }
    </style>
</head>
<body>

<div class="aurora-bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
</div>

<div class="container">
    <h1 class="brand-title">Anan <span class="brand-emoji" title="Touch me!">🐽</span></h1>
    <div class="subtitle">Gallery Quality · Border Studio</div>

    <div class="upload-area" id="dropZone" onclick="document.getElementById('fileInput').click()">
        <div class="spotlight"></div>
        <svg class="upload-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 16.5V9.75m0 0l3 3m-3-3l-3 3M6.75 19.5a2.25 2.25 0 01-2.25-2.25V6.75A2.25 2.25 0 016.75 4.5h10.5A2.25 2.25 0 0119.5 6.75v10.5a2.25 2.25 0 01-2.25 2.25m-10.5 0h10.5" />
        </svg>
        <div class="upload-text">点击或拖拽图片至此</div>
        <div class="upload-hint">支持批量上传本地文件</div>
        <input type="file" id="fileInput" accept="image/jpeg, image/png, image/webp" multiple>
    </div>

    <div class="demo-console" id="demoConsole">
        <div class="console-header">
            <div class="console-title">Live Preview</div>
            <div class="console-dots">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
        </div>
        <div class="demo-area">
            <div class="demo-col">
                <div class="demo-img-wrapper tilt-card">
                    <img src="demo_original.jpg" alt="Original" class="demo-img">
                </div>
                <div class="micro-label">Original</div>
            </div>
            <div class="demo-col">
                <div class="demo-img-wrapper tilt-card">
                    <img src="demo_processed.png" alt="Processed" class="demo-img">
                </div>
                <div class="micro-label">Processed</div>
            </div>
        </div>
    </div>

    <div class="shimmer-container" id="loader">
        <div class="shimmer-card"></div>
    </div>

    <div class="result-container" id="resultContainer"></div>

    <button id="zipBtn" class="batch-download">Download Archive (.zip)</button>

    <div class="footer">Engineered for Aesthetics</div>
</div>

<script>
    // === 交互 1：磁吸聚光灯 & 水波纹 (A+B 核心逻辑) ===
    const dropZone = document.getElementById('dropZone');
    
    // 监听鼠标移动，实时更新聚光灯的 XY 坐标
    dropZone.addEventListener('mousemove', (e) => {
        const rect = dropZone.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        dropZone.style.setProperty('--x', `${x}px`);
        dropZone.style.setProperty('--y', `${y}px`);
    });

    // 监听点击，生成极其丝滑的水波纹
    dropZone.addEventListener('mousedown', function(e) {
        const rect = dropZone.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        
        const circle = document.createElement('span');
        circle.classList.add('ripple');
        circle.style.left = `${x - 50}px`; // 50 是初始宽度的一半，使其居中
        circle.style.top = `${y - 50}px`;
        circle.style.width = '100px';
        circle.style.height = '100px';
        
        this.appendChild(circle);
        
        // 动画结束后移除 DOM，保持干净
        setTimeout(() => circle.remove(), 600);
    });

    // === 交互 2：3D 悬浮倾斜 ===
    function initTiltEffect() {
        const cards = document.querySelectorAll('.tilt-card');
        cards.forEach(card => {
            card.addEventListener('mousemove', e => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                const rotateX = ((y - centerY) / centerY) * -8; 
                const rotateY = ((x - centerX) / centerX) * 8;
                card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.02, 1.02, 1.02)`;
            });
            card.addEventListener('mouseleave', () => {
                card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)`;
            });
        });
    }
    initTiltEffect();

    // === 核心业务逻辑 ===
    const PARAMS = { border_scale: 0.09, blur_radius: 50, corner_radius: 90, shadow_blur: 50, shadow_opacity: 0.4 };
    
    const fileInput = document.getElementById('fileInput');
    const resultContainer = document.getElementById('resultContainer');
    const loader = document.getElementById('loader');
    const demoConsole = document.getElementById('demoConsole');
    const zipBtn = document.getElementById('zipBtn');
    let processedFiles = [];

    fileInput.addEventListener('change', handleFiles);
    
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.style.borderColor = "var(--accent-color)"; });
    dropZone.addEventListener('dragleave', () => dropZone.style.borderColor = "var(--glass-border)");
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault(); dropZone.style.borderColor = "var(--glass-border)";
        if (e.dataTransfer.files.length) processFiles(e.dataTransfer.files);
    });

    function handleFiles(e) { if (e.target.files.length) processFiles(e.target.files); }

    async function processFiles(files) {
        if (demoConsole) demoConsole.style.display = 'none'; // 隐藏控制台
        resultContainer.innerHTML = '';
        processedFiles = [];
        zipBtn.style.display = 'none';
        loader.style.display = 'block';

        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            if (!file.type.match('image.*')) continue;

            try {
                const resultDataUrl = await processSingleImage(file);
                const outputName = `anan_${file.name.split('.')[0]}.png`;
                processedFiles.push({ name: outputName, data: resultDataUrl });
                createResultCard(resultDataUrl, outputName, i + 1, files.length);
            } catch (err) {
                console.error("Error processing:", err);
            }
        }
        loader.style.display = 'none';
        if (processedFiles.length > 1) zipBtn.style.display = 'block';
    }

    function processSingleImage(file) {
        return new Promise((resolve, reject) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const origW = img.width, origH = img.height;
                const baseSize = Math.min(origW, origH);
                let borderWidth = Math.max(Math.floor(baseSize * PARAMS.border_scale), 1);
                const newW = origW + (2 * borderWidth), newH = origH + (2 * borderWidth);

                canvas.width = newW; canvas.height = newH;

                ctx.save(); ctx.filter = `blur(${PARAMS.blur_radius}px)`; ctx.drawImage(img, -50, -50, newW + 100, newH + 100); ctx.restore();
                ctx.save(); ctx.globalAlpha = PARAMS.shadow_opacity; ctx.filter = `blur(${PARAMS.shadow_blur}px)`; ctx.fillStyle = "#000000"; roundRect(ctx, borderWidth, borderWidth, origW, origH, PARAMS.corner_radius); ctx.fill(); ctx.restore();
                ctx.save(); ctx.beginPath(); roundRect(ctx, borderWidth, borderWidth, origW, origH, PARAMS.corner_radius); ctx.clip(); ctx.drawImage(img, borderWidth, borderWidth, origW, origH); ctx.restore();

                resolve(canvas.toDataURL('image/png'));
            };
            img.onerror = reject;
            img.src = URL.createObjectURL(file);
        });
    }

    function roundRect(ctx, x, y, w, h, r) {
        if (w < 2 * r) r = w / 2; if (h < 2 * r) r = h / 2;
        ctx.beginPath(); ctx.moveTo(x + r, y); ctx.arcTo(x + w, y, x + w, y + h, r); ctx.arcTo(x + w, y + h, x, y + h, r); ctx.arcTo(x, y + h, x, y, r); ctx.arcTo(x, y, x + w, y, r); ctx.closePath();
    }

    function createResultCard(dataUrl, name, index, total) {
        const card = document.createElement('div');
        card.className = 'result-card';
        card.innerHTML = `
            <div class="result-img-wrapper tilt-card">
                <img src="${dataUrl}" class="result-img" alt="Result">
            </div>
            <div class="result-footer">
                <span class="result-index">${String(index).padStart(2, '0')} / ${String(total).padStart(2, '0')}</span>
                <a href="${dataUrl}" download="${name}" class="download-link">
                    <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3" />
                    </svg>
                    Save
                </a>
            </div>
        `;
        resultContainer.appendChild(card);
        initTiltEffect();
    }

    zipBtn.addEventListener('click', () => {
        if (!window.JSZip) return alert("JSZip failed to load.");
        const zip = new JSZip();
        processedFiles.forEach(file => { zip.file(file.name, file.data.split(',')[1], {base64: true}); });
        zip.generateAsync({type:"blob"}).then(content => { saveAs(content, "Anan_Frames.zip"); });
    });
</script>
</body>
</html>
